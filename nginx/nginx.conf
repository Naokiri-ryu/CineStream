worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen       8080;
        server_name  localhost;

        # 1. SERVE FRONTEND (File HTML/CSS/JS Statis)
        location / {
            # Ganti jalur di bawah ini sesuai dengan direktori absolut proyekmu
            root   "C:/CineStream/frontend";
            index  index.html;
            try_files $uri $uri/ $uri.html =404;
        }

        # 2. SERVE VIDEO HLS (Streaming segmen video .ts dan playlist .m3u8)
        location /media/hls/ {
            alias   "C:/CineStream/media/hls/";
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin "*";
        }

        # 3. PROXY TO FLASK REST API (Meneruskan request /api/ ke Flask secara utuh)
        location /api/ {
            proxy_pass         http://127.0.0.1:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 4. PROXY TO FLASK-SOCKETIO (Untuk Watch Party Jaringan)
        location /socket.io/ {
            proxy_pass         http://127.0.0.1:5000/socket.io;
            proxy_http_version 1.1;
            proxy_buffering    off;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}