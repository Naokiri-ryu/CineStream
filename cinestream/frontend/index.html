<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineStream</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f13;
    --surface:  #1a1a24;
    --surface2: #24243a;
    --accent:   #7c6fe0;
    --accent2:  #a78bfa;
    --text:     #e8e8f0;
    --muted:    #888899;
    --border:   #2e2e44;
    --success:  #1D9E75;
    --radius:   12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--accent2);
    text-decoration: none;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 12px;
    gap: 8px;
    height: 38px;
    width: 280px;
  }

  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    width: 100%;
  }

  .search-bar input::placeholder { color: var(--muted); }

  /* ── Join Room Banner ── */
  .join-banner {
    background: linear-gradient(135deg, #1e1b4b, #2e1065);
    border-bottom: 1px solid var(--border);
    padding: 12px 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
  }

  .join-banner span { color: var(--muted); }

  .join-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    color: var(--text);
    font-size: 14px;
    width: 140px;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 7px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }

  .btn-accent {
    background: var(--accent);
    color: #fff;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* ── Main ── */
  main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  .section-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
  }

  /* ── Film Grid ── */
  .film-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.25rem;
  }

  .film-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
  }

  .film-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
  }

  .film-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .film-poster-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }

  .film-info {
    padding: 12px;
  }

  .film-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .film-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
  }

  .film-genre {
    background: var(--surface2);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    color: var(--accent2);
  }

  /* Overlay tombol play saat hover */
  .film-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .film-card:hover .film-overlay { opacity: 1; }

  .film-overlay .btn { min-width: 140px; text-align: center; }

  /* ── Modal ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 420px;
    max-width: 90vw;
  }

  .modal-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-group { margin-bottom: 1rem; }

  .form-label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 1.5rem;
    justify-content: flex-end;
  }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    font-size: 14px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 14px;
    z-index: 300;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-icon">▶</div>
    CineStream
  </a>
  <div class="search-bar">
    <span style="color:var(--muted);font-size:16px;">🔍</span>
    <input type="text" id="search" placeholder="Cari film..." oninput="filterFilms()">
  </div>
</header>

<div class="join-banner">
  <span>Punya kode room?</span>
  <input class="join-input" type="text" id="join-code" placeholder="XXXXXX" maxlength="6">
  <input class="form-input" type="text" id="join-name" placeholder="Nama kamu" style="width:160px;padding:7px 12px;font-size:14px;">
  <button class="btn btn-accent" onclick="joinRoom()">Gabung Room →</button>
</div>

<main>
  <div class="section-title">
    Semua Film
    <span class="badge-count" id="film-count">—</span>
  </div>
  <div class="film-grid" id="film-grid">
    <div class="loading">Memuat katalog film...</div>
  </div>
</main>

<!-- Modal buat room -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-title">🎬 Buat Watch Party</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:1.25rem;" id="modal-film-title">—</div>

    <div class="form-group">
      <label class="form-label">Nama kamu (sebagai Host)</label>
      <input class="form-input" type="text" id="host-name" placeholder="Masukkan namamu">
    </div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-accent" onclick="createRoom()">Buat Room</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allFilms = [];
let selectedFilmId = null;

async function loadFilms() {
  try {
    const res = await fetch('/api/films');
    allFilms = await res.json();
    renderFilms(allFilms);
    document.getElementById('film-count').textContent = allFilms.length;
  } catch (e) {
    document.getElementById('film-grid').innerHTML =
      '<div class="loading">Gagal memuat film. Pastikan server berjalan.</div>';
  }
}

function renderFilms(films) {
  const grid = document.getElementById('film-grid');
  if (!films.length) {
    grid.innerHTML = '<div class="loading">Tidak ada film yang ditemukan.</div>';
    return;
  }

  grid.innerHTML = films.map(f => `
    <div class="film-card">
      ${f.poster_url
        ? `<img class="film-poster" src="${f.poster_url}" alt="${f.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="film-poster-placeholder" ${f.poster_url ? 'style="display:none"' : ''}>🎬</div>
      <div class="film-info">
        <div class="film-title">${f.title}</div>
        <div class="film-meta">
          <span>${f.year || '—'}</span>
          <span>·</span>
          <span>${f.duration ? f.duration + ' mnt' : '—'}</span>
          <span class="film-genre">${f.genre || 'Film'}</span>
        </div>
      </div>
      <div class="film-overlay">
        <button class="btn btn-accent" onclick="watchFilm(${f.id}, event)">▶ Tonton Sendiri</button>
        <button class="btn btn-outline" onclick="openModal(${f.id}, '${f.title.replace(/'/g,"\\'")}', event)">👥 Watch Party</button>
      </div>
    </div>
  `).join('');
}

function filterFilms() {
  const q = document.getElementById('search').value.toLowerCase();
  renderFilms(allFilms.filter(f =>
    f.title.toLowerCase().includes(q) || (f.genre || '').toLowerCase().includes(q)
  ));
}

function watchFilm(filmId, e) {
  e && e.stopPropagation();
  window.location.href = `/watch?film=${filmId}`;
}

function openModal(filmId, title, e) {
  e && e.stopPropagation();
  selectedFilmId = filmId;
  document.getElementById('modal-film-title').textContent = '📽 ' + title;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  selectedFilmId = null;
}

async function createRoom() {
  const hostName = document.getElementById('host-name').value.trim() || 'Host';
  if (!selectedFilmId) return;

  try {
    const res = await fetch('/api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ film_id: selectedFilmId, host_name: hostName }),
    });
    const data = await res.json();
    closeModal();
    // Buka halaman watch party sebagai host
    window.location.href = `/watch?room=${data.room_code}&host=1&name=${encodeURIComponent(hostName)}`;
  } catch (e) {
    showToast('Gagal membuat room. Coba lagi.');
  }
}

async function joinRoom() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const name = document.getElementById('join-name').value.trim() || 'Penonton';
  if (!code || code.length !== 6) {
    showToast('Masukkan kode room 6 karakter.');
    return;
  }

  const res = await fetch(`/api/rooms/${code}`);
  if (!res.ok) { showToast('Room tidak ditemukan.'); return; }

  window.location.href = `/watch?room=${code}&name=${encodeURIComponent(name)}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Tutup modal jika klik backdrop
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadFilms();
</script>
</body>
</html>
