<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movia - Home</title>

    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav class="navbar" id="navbar">
      <a class="logo" href="/">
        <div class="logo-icon">▶</div>
        Movia
      </a>

      <button class="mobile-toggle" id="mobile-toggle">☰</button>

      <div class="nav-links" id="nav-links">
        <a href="/" class="active">Home</a>
        <a
          href="#"
          onclick="
            document.getElementById('search-container').classList.toggle('show')
          "
          >Search</a
        >
        <a href="#" onclick="showJoinModal()">Gabung Room</a>
        <div id="auth-container" style="display: flex; align-items: center;"></div>
        <button class="theme-toggle" id="theme-toggle" title="Ubah Tema">
          🌙
        </button>
      </div>

      <div class="search-container" id="search-container">
        <input
          type="text"
          id="search"
          placeholder="Cari film..."
          oninput="filterFilms()"
        />
      </div>
    </nav>

    <header class="hero" id="hero-section">
      <div class="hero-overlay"></div>
      <div class="hero-content" id="hero-content">
        <h1 class="hero-title">Memuat...</h1>
      </div>
      <button class="hero-nav left" onclick="prevSlide()">&#10094;</button>
      <button class="hero-nav right" onclick="nextSlide()">&#10095;</button>
    </header>

    <main>
      <section class="movie-section" style="margin-bottom: 3rem">
        <h2 class="section-title">🔴 Room Watch Party Aktif</h2>
        <div class="film-grid" id="active-rooms-grid">
          <div style="color: var(--muted); font-size: 14px">
            Memuat room aktif...
          </div>
        </div>
      </section>

      <section class="movie-section">
        <h2 class="section-title">
          Film Tersedia <span class="badge-count" id="film-count">0</span>
        </h2>
        <div class="film-grid" id="film-grid">
          <div class="loading">Memuat katalog film...</div>
        </div>
      </section>
    </main>

    <div class="modal-backdrop" id="modal">
      <div class="modal">
        <div class="modal-tabs">
          <button
            class="tab-btn active"
            id="tab-btn-create"
            onclick="switchModalTab('create')"
          >
            Buat Room
          </button>
          <button
            class="tab-btn"
            id="tab-btn-join"
            onclick="switchModalTab('join')"
          >
            Gabung Room
          </button>
        </div>

        <div id="modal-create" class="modal-form active">
          <div
            style="font-size: 13px; color: var(--muted); margin-bottom: 1rem"
            id="modal-film-title"
          >
            Pilih film dulu dari katalog
          </div>
          <div class="form-group">
            <label class="form-label">Nama Kamu (Host)</label>
            <input
              class="form-input"
              type="text"
              id="host-name"
              placeholder="Masukkan namamu"
            />
          </div>
          <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal()">
              Batal
            </button>
            <button class="btn btn-accent" onclick="createRoom()">
              Buat Room
            </button>
          </div>
        </div>

        <div id="modal-join" class="modal-form">
          <div class="form-group">
            <label class="form-label">Kode Room</label>
            <input
              class="form-input"
              type="text"
              id="join-code"
              placeholder="Contoh: A1B2C3"
              maxlength="6"
              style="text-transform: uppercase"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Nama Kamu</label>
            <input
              class="form-input"
              type="text"
              id="join-name"
              placeholder="Masukkan namamu"
            />
          </div>
          <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal()">
              Batal
            </button>
            <button class="btn btn-accent" onclick="joinRoom()">Gabung</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/js/main.js?v=1"></script>
  </body>
</html>
