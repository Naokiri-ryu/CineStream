<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movia — Nonton</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.14/dist/hls.min.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

    <link rel="stylesheet" href="/css/style.css" />

    <link rel="stylesheet" href="/css/watch.css" />
  </head>
  <body>
    <nav class="navbar scrolled" id="navbar">
      <a class="logo" href="/">
        <div class="logo-icon">▶</div>
        Movia
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="#" class="active">Nonton</a>
        <button class="theme-toggle" id="theme-toggle" title="Ubah Tema">
          🌙
        </button>
      </div>
    </nav>

    <div class="watch-container">
      <div class="main-layout">
        <div class="video-area">
          <div class="video-wrapper">
            <video id="video" controls></video>
          </div>
          <div class="video-info">
            <h1 class="video-title" id="video-title">Memuat judul film...</h1>
            <div class="sync-status">
              <span class="sync-dot" id="sync-dot"></span>
              <span id="sync-label">Menghubungkan jaringan...</span>
            </div>
          </div>
        </div>

        <aside class="sidebar">
          <div class="tabs">
            <button
              class="tab active"
              id="btn-tab-room"
              onclick="switchTab('room')"
            >
              Info Room
            </button>
            <button class="tab" id="btn-tab-chat" onclick="switchTab('chat')">
              Chat Room
            </button>
          </div>

          <div id="tab-room" class="tab-panel active">
            <div class="room-info-card">
              <div class="info-group">
                <label>Kode Room Watch Party</label>
                <div class="room-code-row">
                  <span class="room-code" id="display-room-code">——</span>
                  <button
                    class="btn-copy"
                    id="btn-copy-code"
                    onclick="copyRoomCode()"
                  >
                    📋 Salin Kode
                  </button>
                </div>
              </div>
              <div class="info-group">
                <label>Identitas Pembuat (Host)</label>
                <div class="info-value" id="display-host">——</div>
              </div>
              <div class="info-group">
                <label>Peran Anda Saat Ini</label>
                <div class="info-value" id="display-role">
                  Mode Tonton Mandiri
                </div>
                <div
                  class="info-group"
                  style="
                    margin-top: 10px;
                    border-top: 1px solid var(--border);
                    padding-top: 15px;
                  "
                >
                  <label
                    >Daftar Penonton (<span id="user-count">1</span>)</label
                  >
                  <ul class="user-list" id="user-list">
                    <li style="color: var(--muted); font-style: italic">
                      Memuat...
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>

          <div id="tab-chat" class="tab-panel">
            <div class="chat-box-layout">
              <div class="chat-messages" id="chat-messages"></div>
              <form
                class="chat-input-area"
                id="chat-form"
                onsubmit="sendChatMessage(event)"
              >
                <input
                  type="text"
                  id="chat-input"
                  placeholder="Tulis pesan di sini..."
                  autocomplete="off"
                />
                <button type="submit">Kirim</button>
              </form>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <script src="/js/watch.js"></script>
  </body>
</html>
